<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация и вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!--Шапка-->
    <header>
        <div class="header-content">
            <img src="logo.webp" alt="Логотип" class="logo">
            <h1>Управление библиотечным фондом</h1>
        </div>
    </header>
<!--Маин контейнер-->
<div class="container">
<!--Вход и регистрация-->
    <div class="readable-window2">
<!--Для осмотр сайта для любых ролей-->
        <h2 class="center-text">Вход в систему</h2>

        <div class="role-buttons">
            <a href="chit.html" class="role-btn">Войти как читатель</a>
            <a href="admin.html" class="role-btn">Войти как администратор</a>
            <a href="bibl.html" class="role-btn">Войти как библиотекарь</a>
        </div>
<!--Регистрация-->
        <h2 class="center-text">Вход</h2>

        <form action="#" method="post">
            <input type="text" placeholder="Логин" required>
            <input type="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        
        <p>Нет аккаунта? <a href="index.html">Зарегистрируйте здесь</a></p>
    </div>

</div>

<footer>
    <p>2026 Информационная система управления библиотечным фондом</p>
</footer>

</body>
</html>
